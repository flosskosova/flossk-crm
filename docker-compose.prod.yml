services:
  postgres:
    image: postgres:16-alpine
    container_name: flossk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: FLOSSK
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d FLOSSK"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:stable
    container_name: flossk-clamav
    restart: unless-stopped
    volumes:
      - clamav-db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  api:
    build:
      context: ./flossk-ms
      dockerfile: FlosskMS.API/Dockerfile
    container_name: flossk-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      # Docker-specific overrides (service hostnames differ from local)
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=FLOSSK;Username=postgres;Password=${POSTGRES_PASSWORD}"
      ClamAvSettings__Host: clamav
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: flossk-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend

  frontend:
    build:
      context: ./sakai-ng
      dockerfile: Dockerfile
    container_name: flossk-frontend
    restart: unless-stopped
    depends_on:
      - api

volumes:
  postgres-data:
  clamav-db:
  uploads:
  caddy-data:
  caddy-config: